name: CI / Release

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v6
      - name: Run tests
        run: ./gradlew build

  release-please:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name:        ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v6
      - name: Publish to GitHub Packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew publish
      - name: Delete corresponding SNAPSHOT from GitHub Packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(grep -m1 '^version=' gradle.properties | cut -d= -f2)
          SNAPSHOT="${VERSION}-SNAPSHOT"
          echo "Looking for $SNAPSHOT to clean up..."
          VERSION_ID=$(gh api \
            /orgs/sergiodelgadotech/packages/maven/tech.sergiodelgado.kotlin-saas-starter/versions \
            --jq ".[] | select(.name == \"$SNAPSHOT\") | .id" 2>/dev/null || true)
          if [ -n "$VERSION_ID" ]; then
            echo "Deleting $SNAPSHOT (id: $VERSION_ID)"
            gh api --method DELETE \
              "/orgs/sergiodelgadotech/packages/maven/tech.sergiodelgado.kotlin-saas-starter/versions/$VERSION_ID"
            echo "Deleted."
          else
            echo "$SNAPSHOT not found — nothing to delete."
          fi

  publish-snapshot:
    needs: [test, release-please]
    # Skip on release runs — the publish job handles those. Publishing a snapshot
    # on a release push is wrong because the release-please branch is deleted at
    # that point, so the version fallback would emit {released-version}-SNAPSHOT.
    if: >-
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.release-please.outputs.release_created != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine snapshot version
        id: version
        run: |
          BRANCH="release-please--branches--main--components--kotlin-saas-starter"
          git fetch origin "$BRANCH" 2>/dev/null || true
          NEXT=$(git show "origin/$BRANCH:gradle.properties" 2>/dev/null \
                 | grep -m1 '^version=' | cut -d= -f2)
          if [ -z "$NEXT" ]; then
            echo "No release-please branch open — will skip snapshot publish."
          fi
          echo "snapshot=${NEXT:+${NEXT}-SNAPSHOT}" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v6
      - name: Publish SNAPSHOT to GitHub Packages
        if: steps.version.outputs.snapshot != ''
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SNAPSHOT_VERSION: ${{ steps.version.outputs.snapshot }}
        run: |
          echo "Publishing $SNAPSHOT_VERSION"
          ./gradlew publish -Pversion="$SNAPSHOT_VERSION"
